name: zz-diagnose-fetch
on:
  push:
    branches: [fix/torch-cpu-and-release-v2.0.2]
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with: { lfs: true, fetch-depth: 0, ref: fix/torch-cpu-and-release-v2.0.2 }
      - uses: conda-incubator/setup-miniconda@v3
        with: { auto-update-conda: true, python-version: "3.12", auto-activate-base: false }
      - name: Clone repo
        run: |
          rm -rf *
          git clone https://github.com/miquelduranfrigola/eos6m2k.git
      - name: Install ersilia
        run: |
          conda run -n base git-lfs install
          conda run -n base python -m pip install "git+https://github.com/ersilia-os/ersilia.git"
      - name: Fetch (python 3.10 env) + show output + env
        env: { MODEL_ID: eos6m2k, PYTHONUNBUFFERED: "1" }
        run: |
          conda run -n base bash -c "ersilia -v fetch $MODEL_ID --from_dir $MODEL_ID" > /tmp/fetch.log 2>&1 || true
          echo "==== conda envs ===="; conda env list
          echo "==== eos6m2k env python present? ===="; ls -la /usr/share/miniconda/envs/eos6m2k/bin/python 2>/dev/null || echo "MISSING"
          echo "==== result ===="; grep -niE "all empty|done successfully|fetched successfully" /tmp/fetch.log | tail -3
          echo "==== output sample ===="; grep -A6 "This is the output" /tmp/fetch.log | sed -E 's/^[^Z]*Z //' | head -8
