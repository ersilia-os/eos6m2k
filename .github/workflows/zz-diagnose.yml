name: zz-diagnose-fetch
on:
  push:
    branches: [fix/torch-cpu-and-release-v2.0.2]
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with: { lfs: true, fetch-depth: 0, ref: fix/torch-cpu-and-release-v2.0.2 }
      - uses: conda-incubator/setup-miniconda@v3
        with: { auto-update-conda: true, python-version: "3.12", auto-activate-base: false }
      - name: Clone repo
        run: |
          rm -rf *
          git clone https://github.com/miquelduranfrigola/eos6m2k.git
      - name: Install ersilia
        run: |
          conda run -n base git-lfs install
          conda run -n base python -m pip install "git+https://github.com/ersilia-os/ersilia.git"
      - name: Fetch + capture ALL ersilia session logs (serve detail)
        env: { MODEL_ID: eos6m2k, PYTHONUNBUFFERED: "1" }
        run: |
          rm -rf /tmp/cap; mkdir -p /tmp/cap
          conda run -n base bash -c "ersilia -v fetch $MODEL_ID --from_dir $MODEL_ID" > /tmp/fetch.log 2>&1 &
          FPID=$!
          while kill -0 $FPID 2>/dev/null; do
            for L in $(find "$HOME/eos/sessions" -name "*.log" 2>/dev/null); do cp "$L" "/tmp/cap/$(basename $(dirname $L))_$(basename $L)" 2>/dev/null; done
            sleep 0.2
          done
          echo "==== captured session logs ===="; ls -la /tmp/cap/
          echo "==== concatenated session logs (grep serve/run/run.sh/error/empty/main) ===="
          for f in /tmp/cap/*.log; do echo "### $f"; grep -niE "run.sh|main.py|serve|uvicorn|port|empty|error|traceback|exception|exit|fail|/code/|model run|outcome|No such" "$f" 2>/dev/null | head -30; done
