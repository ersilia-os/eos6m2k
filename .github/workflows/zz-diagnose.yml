name: zz-diagnose-fetch
on:
  push:
    branches: [fix/torch-cpu-and-release-v2.0.2]
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with: { lfs: true, fetch-depth: 0, ref: fix/torch-cpu-and-release-v2.0.2 }
      - uses: conda-incubator/setup-miniconda@v3
        with: { auto-update-conda: true, python-version: "3.12", auto-activate-base: false }
      - name: Clone repo
        run: |
          rm -rf *
          git clone https://github.com/miquelduranfrigola/eos6m2k.git
      - name: Install ersilia
        run: |
          conda run -n base git-lfs install
          conda run -n base python -m pip install "git+https://github.com/ersilia-os/ersilia.git"
      - name: Fetch + capture main.py log + session 500s
        env: { MODEL_ID: eos6m2k, PYTHONUNBUFFERED: "1" }
        run: |
          rm -f /tmp/main_diag.log
          conda run -n base bash -c "ersilia -v fetch $MODEL_ID --from_dir $MODEL_ID" > /tmp/fetch.log 2>&1 &
          FPID=$!
          : > /tmp/sess.txt
          while kill -0 $FPID 2>/dev/null; do
            grep -rhniE "successfully served|500 Server Error|Connection refused|Batch of size|empty output" "$HOME/eos/sessions" 2>/dev/null >> /tmp/sess.txt
            sleep 0.5
          done
          echo "================ /tmp/main_diag.log (did main.py run? error?) ================"
          cat /tmp/main_diag.log 2>/dev/null || echo "(main.py NEVER ran)"
          echo "================ session serve/500 lines (captured during fetch) ================"
          sort -u /tmp/sess.txt | grep -iE "served|500|Batch|empty" | head -20
