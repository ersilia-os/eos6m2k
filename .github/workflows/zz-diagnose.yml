name: zz-diagnose-fetch

on:
  push:
    branches:
      - fix/torch-cpu-and-release-v2.0.2

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          lfs: true
          fetch-depth: 0
          ref: fix/torch-cpu-and-release-v2.0.2

      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          auto-activate-base: false

      - name: Clone repo
        run: |
          rm -rf *
          git clone https://github.com/miquelduranfrigola/eos6m2k.git

      - name: Install ersilia (base = python 3.12, like CI)
        run: |
          conda run -n base git-lfs install
          conda run -n base python -m pip install "git+https://github.com/ersilia-os/ersilia.git"

      - name: Plain verbose fetch in python 3.12 base (output NOT swallowed)
        env:
          MODEL_ID: eos6m2k
          PYTHONUNBUFFERED: "1"
        run: |
          rm -f /tmp/served_stderr.log
          conda run -n base bash -c "python --version; ersilia -v fetch $MODEL_ID --from_dir $MODEL_ID" 2>&1 | tail -300 || true
          echo "================ MODEL RUN STDERR (/tmp/served_stderr.log) ================"
          cat /tmp/served_stderr.log 2>/dev/null || echo "(model run step not reached)"
