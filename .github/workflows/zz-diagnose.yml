name: zz-diagnose-fetch

on:
  push:
    branches:
      - fix/torch-cpu-and-release-v2.0.2

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: "latest"
          python-version: "3.10"
          auto-activate-base: true

      - name: Setup ersilia + git-lfs
        shell: bash -l {0}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y git-lfs
          git lfs install
          python -m pip install -q "git+https://github.com/ersilia-os/ersilia.git"

      - name: Reproduce the exact failing test command (ersilia test --shallow)
        shell: bash -l {0}
        run: |
          set +e
          rm -f /tmp/served_stderr.log
          # mirror the reusable workflow: a fresh clone dir named eos6m2k
          rm -rf eos6m2k_src && cp -r "$GITHUB_WORKSPACE" /tmp/eos6m2k_src && rm -rf /tmp/eos6m2k_src/.git
          mkdir -p /tmp/run && cd /tmp/run && cp -r /tmp/eos6m2k_src eos6m2k
          echo "================ ersilia -v test --shallow --from_dir (FULL OUTPUT) ================"
          yes | ersilia -v test eos6m2k --shallow --from_dir eos6m2k 2>&1 | tail -300
          echo "TEST_EXIT=${PIPESTATUS[1]}"
          echo "================ MODEL RUN STDERR (/tmp/served_stderr.log) ================"
          cat /tmp/served_stderr.log 2>/dev/null || echo "(model run step not reached / no stderr)"
          echo "================ standard_run.log(s) ================"
          find "$HOME/eos" -name "standard_run.log" -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null || echo "(none)"
