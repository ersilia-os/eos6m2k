name: zz-diagnose-fetch
on:
  push:
    branches: [fix/torch-cpu-and-release-v2.0.2]
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with: { lfs: true, fetch-depth: 0, ref: fix/torch-cpu-and-release-v2.0.2 }
      - uses: conda-incubator/setup-miniconda@v3
        with: { auto-update-conda: true, python-version: "3.12", auto-activate-base: false }
      - name: Clone repo
        run: |
          rm -rf *
          git clone https://github.com/miquelduranfrigola/eos6m2k.git
      - name: Install ersilia
        run: |
          conda run -n base git-lfs install
          conda run -n base python -m pip install "git+https://github.com/ersilia-os/ersilia.git"
      - name: Fetch + capture env package versions
        shell: bash {0}
        env: { MODEL_ID: eos6m2k, PYTHONUNBUFFERED: "1" }
        run: |
          set +e
          EP=/usr/share/miniconda/envs/eos6m2k/bin/python
          conda run -n base bash -c "ersilia -v fetch $MODEL_ID --from_dir $MODEL_ID" > /tmp/fetch.log 2>&1 &
          FPID=$!
          : > /tmp/pkgs.txt
          while kill -0 $FPID 2>/dev/null; do
            if [ -x "$EP" ]; then "$EP" -m pip show xgboost setuptools numpy scikit-learn 2>/dev/null | grep -iE "^Name|^Version" >> /tmp/pkgs.txt; echo "----" >> /tmp/pkgs.txt; fi
            sleep 1
          done
          echo "==== env package versions over time (unique) ===="; sort -u /tmp/pkgs.txt
          echo "==== build pip lines for xgboost/setuptools in fetch.log ===="
          grep -niE "xgboost|setuptools|Requirement already satisfied|Successfully installed" /tmp/fetch.log | grep -iE "xgboost|setuptools" | sed -E 's/^[^Z]*Z //' | head -20
          echo "(end)"
