name: zz-diagnose-fetch

on:
  push:
    branches:
      - fix/torch-cpu-and-release-v2.0.2

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          lfs: true
          fetch-depth: 0
          ref: fix/torch-cpu-and-release-v2.0.2

      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          auto-activate-base: false

      - name: Clone repo (mirror reusable workflow exactly)
        run: |
          rm -rf *
          git clone https://github.com/miquelduranfrigola/eos6m2k.git

      - name: Install dependencies (mirror reusable workflow exactly)
        run: |
          conda run -n base git-lfs install
          conda run -n base python -m pip install 'ersilia[test] @ git+https://github.com/ersilia-os/ersilia.git'

      - name: Run exact test command + surface served error
        env:
          MODEL_ID: eos6m2k
          PYTHONUNBUFFERED: "1"
        run: |
          rm -f /tmp/served_stderr.log
          conda run -n base bash -c "ersilia -v test $MODEL_ID --shallow --from_dir $MODEL_ID" 2>&1 | tail -250 || true
          echo "================ MODEL RUN STDERR (/tmp/served_stderr.log) ================"
          cat /tmp/served_stderr.log 2>/dev/null || echo "(model run step not reached)"
          echo "================ standard_run.log(s) ================"
          find "$HOME/eos" -name "standard_run.log" -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null || echo "(none)"
          echo "================ ${MODEL_ID}-test.json ================"
          cat ${MODEL_ID}-test.json 2>/dev/null || echo "(no json)"
