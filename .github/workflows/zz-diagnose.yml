name: zz-diagnose-fetch
on:
  push:
    branches: [fix/torch-cpu-and-release-v2.0.2]
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with: { lfs: true, fetch-depth: 0, ref: fix/torch-cpu-and-release-v2.0.2 }
      - uses: conda-incubator/setup-miniconda@v3
        with: { auto-update-conda: true, python-version: "3.12", auto-activate-base: false }
      - name: Clone repo
        run: |
          rm -rf *
          git clone https://github.com/miquelduranfrigola/eos6m2k.git
      - name: Install ersilia
        run: |
          conda run -n base git-lfs install
          conda run -n base python -m pip install "git+https://github.com/ersilia-os/ersilia.git"
      - name: Fetch + fine timeline correlated with serve/500
        env: { MODEL_ID: eos6m2k, PYTHONUNBUFFERED: "1" }
        run: |
          EXP=/usr/share/miniconda/envs/eos6m2k/bin/python
          : > /tmp/timeline.txt
          conda run -n base bash -c "ersilia -v fetch $MODEL_ID --from_dir $MODEL_ID" > /tmp/fetch.log 2>&1 &
          FPID=$!
          while kill -0 $FPID 2>/dev/null; do
            if [ -e "$EXP" ]; then S=PRESENT; else S=MISSING; fi
            echo "$(date +%H:%M:%S) py=$S realenv=$(ls -d /usr/share/miniconda/envs/eos6m2k 2>/dev/null && echo yes || echo no)" >> /tmp/timeline.txt
            sleep 0.5
          done
          echo "==== timeline (env python existence over time) ===="; uniq -f1 /tmp/timeline.txt | tail -50
          echo "==== serve 'successfully served' + first 500 timestamps from session logs ===="
          grep -rhniE "successfully served|500 Server Error|Connection refused|Server response received|Batch of size" "$HOME/eos/sessions" 2>/dev/null | sed -E 's/\|.*\| / | /' | head -15
